<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Garden Trees</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --moss: #2d3d1e;
    --forest: #1a2710;
    --bark: #3d2b1a;
    --sage: #7a9c5a;
    --cream: #f0ead8;
    --parchment: #e8dfc7;
    --rust: #b5581e;
    --ink: #0f1a08;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--forest);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LANDING ── */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 2rem;
    overflow: hidden;
  }

  /* textured background */
  #landing::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(45,61,30,0.9) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(26,39,16,0.95) 0%, transparent 50%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.012) 2px,
        rgba(255,255,255,0.012) 4px
      );
    pointer-events: none;
  }

  /* decorative ring */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(122,156,90,0.15);
    pointer-events: none;
  }
  .ring-1 { width: 500px; height: 500px; top: -100px; right: -150px; }
  .ring-2 { width: 300px; height: 300px; bottom: -80px; left: -80px; border-color: rgba(122,156,90,0.08); }

  .hero-inner {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 600px;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1.2rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  /* STENCIL headline */
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(5rem, 18vw, 10rem);
    line-height: 0.88;
    text-transform: uppercase;
    color: transparent;
    -webkit-text-stroke: 2px var(--cream);
    letter-spacing: -0.02em;
    position: relative;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
  }

  .headline .filled {
    color: var(--cream);
    -webkit-text-stroke: 0;
  }

  .subhead {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(240,234,216,0.55);
    margin-top: 1.4rem;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  .upload-zone {
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  #file-input { display: none; }

  .upload-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--sage);
    color: var(--ink);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 1rem 2rem;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .upload-btn:hover { background: #8fb36a; transform: translateY(-2px); }
  .upload-btn:active { transform: translateY(0); }

  .upload-btn svg { width: 18px; height: 18px; }

  .hint {
    margin-top: 1rem;
    font-size: 0.78rem;
    color: rgba(240,234,216,0.35);
    letter-spacing: 0.05em;
  }

  /* drop overlay */
  #drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,39,16,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.2em;
    color: var(--sage);
    text-transform: uppercase;
    border: 3px dashed var(--sage);
    margin: 2rem;
  }

  /* ── RESULT PAGE ── */
  #result-page {
    display: none;
    min-height: 100vh;
    padding: 2rem;
    max-width: 720px;
    margin: 0 auto;
  }

  .result-back {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    transition: opacity 0.2s;
  }
  .result-back:hover { opacity: 0.7; }

  .result-card {
    background: var(--moss);
    border: 1px solid rgba(122,156,90,0.25);
    overflow: hidden;
  }

  .result-photo {
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    display: block;
    filter: saturate(0.85) contrast(1.05);
  }

  .result-header {
    padding: 1.8rem 2rem 1.2rem;
    border-bottom: 1px solid rgba(122,156,90,0.2);
  }

  .result-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.5rem;
  }

  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 900;
    line-height: 1;
    color: var(--cream);
  }

  .result-scientific {
    font-family: 'Barlow', sans-serif;
    font-style: italic;
    font-size: 0.9rem;
    color: rgba(240,234,216,0.45);
    margin-top: 0.4rem;
  }

  .result-body {
    padding: 1.5rem 2rem 2rem;
  }

  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: rgba(122,156,90,0.15);
    border: 1px solid rgba(122,156,90,0.15);
    margin-bottom: 1.5rem;
  }

  .data-cell {
    background: var(--moss);
    padding: 1rem 1.2rem;
  }

  .data-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.3rem;
  }

  .data-value {
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    color: var(--cream);
    font-weight: 400;
    line-height: 1.3;
  }

  .alert-cell {
    grid-column: 1 / -1;
  }

  .alert-cell .data-value {
    color: #e8a87c;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.6rem;
    margin-top: 1.4rem;
  }

  .prose {
    font-size: 0.92rem;
    line-height: 1.7;
    color: rgba(240,234,216,0.8);
    font-weight: 300;
  }

  /* loading */
  #loading-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--forest);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.5rem;
  }

  .loader-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--sage);
    animation: pulse 1.6s ease-in-out infinite;
  }

  .loader-ring {
    width: 48px;
    height: 48px;
    border: 2px solid rgba(122,156,90,0.2);
    border-top-color: var(--sage);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* error */
  .error-msg {
    color: #e8a87c;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    margin-top: 1rem;
    display: none;
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">Identifying your tree…</div>
</div>

<!-- DROP OVERLAY -->
<div id="drop-overlay">Drop your photo here</div>

<!-- LANDING -->
<section id="landing">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="hero-inner">
    <div class="eyebrow">Tree Identification for Home Gardeners</div>
    <div class="headline">
      <span class="filled">Gar</span>den<br><span class="filled">Tr</span>ees
    </div>
    <div class="subhead">Upload a photo — know your tree</div>
    <div class="upload-zone">
      <input type="file" id="file-input" accept="image/*" />
      <button class="upload-btn" onclick="document.getElementById('file-input').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload a Photo
      </button>
      <div class="hint">or drag & drop anywhere</div>
      <div class="error-msg" id="error-msg">Something went wrong. Please try again.</div>
    </div>
  </div>
</section>

<!-- RESULT -->
<section id="result-page">
  <button class="result-back" onclick="goBack()">
    ← New Identification
  </button>
  <div class="result-card">
    <img id="result-photo" class="result-photo" src="" alt="Uploaded tree" />
    <div class="result-header">
      <div class="result-tag">Tree Identified</div>
      <div class="result-name" id="result-name">—</div>
      <div class="result-scientific" id="result-scientific">—</div>
    </div>
    <div class="result-body">
      <div class="data-grid" id="data-grid">
        <!-- populated by JS -->
      </div>
      <div class="section-label">About This Tree</div>
      <div class="prose" id="result-prose">—</div>
    </div>
  </div>
</section>

<script>
// ============================================================
//  PASTE YOUR ANTHROPIC API KEY BELOW (between the quotes)
// ============================================================
const ANTHROPIC_API_KEY = 'YOUR_API_KEY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';
// ============================================================

const fileInput = document.getElementById('file-input');
const landing = document.getElementById('landing');
const resultPage = document.getElementById('result-page');
const loadingScreen = document.getElementById('loading-screen');
const dropOverlay = document.getElementById('drop-overlay');
const errorMsg = document.getElementById('error-msg');

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

// drag & drop
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropOverlay.style.display = 'none'; });
document.addEventListener('drop', e => {
  e.preventDefault();
  dropOverlay.style.display = 'none';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

function goBack() {
  resultPage.style.display = 'none';
  landing.style.display = 'flex';
  fileInput.value = '';
}

async function handleFile(file) {
  errorMsg.style.display = 'none';

  // show photo preview immediately
  const objectUrl = URL.createObjectURL(file);
  document.getElementById('result-photo').src = objectUrl;

  // show loading
  loadingScreen.style.display = 'flex';
  landing.style.display = 'none';

  // convert to base64
  const base64 = await toBase64(file);
  const mediaType = file.type || 'image/jpeg';

  try {
    const result = await identifyTree(base64, mediaType);
    populateCard(result);
    loadingScreen.style.display = 'none';
    resultPage.style.display = 'block';
    window.scrollTo(0, 0);
  } catch (err) {
    console.error(err);
    loadingScreen.style.display = 'none';
    landing.style.display = 'flex';
    errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
    errorMsg.style.display = 'block';
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function identifyTree(base64, mediaType) {
  const systemPrompt = `You are a tree identification expert helping home gardeners understand trees in their yard. 
Analyze the uploaded image and respond ONLY with a JSON object (no markdown, no backticks) in this exact structure:
{
  "commonName": "Common name of the tree",
  "scientificName": "Scientific name in italics format",
  "matureSize": "e.g. 40–60 ft tall, 30 ft spread",
  "maintenance": "Low / Medium / High",
  "seasonal": "Brief note on seasonal behavior (leaf drop, flowering, etc.)",
  "watchOut": "Any notable concerns: invasive roots, messy fruit, allergenic pollen, brittle branches, or 'None notable'",
  "waterNeeds": "Low / Medium / High — with one sentence of context",
  "nativeStatus": "Native, Non-native, or Invasive — and general region",
  "gardenerSummary": "2–3 plain-language sentences about what this tree means for a home gardener. Practical, friendly tone. What should they know about living with this tree?"
}
If the image does not clearly show a tree or you cannot identify it, still return JSON with commonName: "Tree not identified" and gardenerSummary explaining what you saw.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': ANTHROPIC_API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{
        role: 'user',
        content: [{
          type: 'image',
          source: { type: 'base64', media_type: mediaType, data: base64 }
        }, {
          type: 'text',
          text: 'Please identify this tree and provide the gardening information.'
        }]
      }]
    })
  });

  if (!response.ok) {
    const errBody = await response.text();
    throw new Error(`API ${response.status}: ${errBody}`);
  }
  const data = await response.json();
  const text = data.content.find(b => b.type === 'text')?.text || '';

  if (!text) throw new Error('Empty response from API');

  // Try multiple extraction strategies
  let parsed = null;

  // 1. Direct parse (if response is pure JSON)
  try { parsed = JSON.parse(text.trim()); } catch {}

  // 2. Strip markdown fences and retry
  if (!parsed) {
    try {
      const stripped = text.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
      parsed = JSON.parse(stripped);
    } catch {}
  }

  // 3. Extract first {...} block
  if (!parsed) {
    try {
      const match = text.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
    } catch {}
  }

  if (!parsed) throw new Error('Invalid response format. Raw: ' + text.slice(0, 200));
  return parsed;
}

function populateCard(d) {
  document.getElementById('result-name').textContent = d.commonName || '—';
  document.getElementById('result-scientific').textContent = d.scientificName || '';
  document.getElementById('result-prose').textContent = d.gardenerSummary || '';

  const grid = document.getElementById('data-grid');
  grid.innerHTML = '';

  const cells = [
    { label: 'Mature Size', value: d.matureSize },
    { label: 'Maintenance', value: d.maintenance },
    { label: 'Water Needs', value: d.waterNeeds },
    { label: 'Seasonal', value: d.seasonal },
    { label: 'Native Status', value: d.nativeStatus },
    { label: '⚠ Watch Out For', value: d.watchOut, alert: d.watchOut && d.watchOut.toLowerCase() !== 'none notable' }
  ];

  cells.forEach(c => {
    if (!c.value) return;
    const cell = document.createElement('div');
    cell.className = 'data-cell' + (c.alert ? ' alert-cell' : '');
    cell.innerHTML = `<div class="data-label">${c.label}</div><div class="data-value">${c.value}</div>`;
    grid.appendChild(cell);
  });
}
</script>
</body>
</html>
